# Generated by GitHub Copilot
# CI/CD Pipeline — Research Intelligence Agent
#
# 5-job pipeline (triggered manually or on push to main):
#   1. quality    — ruff lint, mypy type check, pytest unit tests
#   2. security   — Trivy container scan, Bandit Python security, checkov IaC
#   3. build      — Docker multi-stage build, push to ACR (tagged with git SHA)
#   4. deploy     — terraform apply, Container Apps revision update
#   5. smoke      — POST /health, basic API smoke test
#
# Auth: GitHub OIDC → Azure Federated Identity (zero long-lived credentials)
# Matches exact pattern from RAG app — consistent portfolio story.

name: CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [apply, destroy]
  push:
    branches: [main]
    paths-ignore: ["docs/**", "*.md"]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: research-agent

jobs:
  # ── Job 1: Quality gates ────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install poetry && poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check app/ tests/

      - name: Type check (mypy)
        run: poetry run mypy app/backend/

      - name: Unit tests
        run: poetry run pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Job 2: Security scanning ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Bandit — Python security scan
        uses: jpetrucciani/bandit-check@main
        with:
          path: app/backend/
          bandit_flags: "-ll"  # High severity only

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          soft_fail: true

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan -f app/backend/Dockerfile .

      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

  # ── Job 3: Build + push to ACR ──────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [quality, security]
    permissions:
      id-token: write  # Required for OIDC
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — zero credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          echo "server=$(az acr list --query '[0].loginServer' -o tsv)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push to ACR (OIDC — no ACR password)
        run: |
          az acr build \
            --registry ${{ steps.acr.outputs.server }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file app/backend/Dockerfile \
            .

  # ── Job 4: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform init
        working-directory: infra/
        run: terraform init

      - name: Terraform ${{ github.event.inputs.action || 'apply' }}
        working-directory: infra/
        run: |
          terraform ${{ github.event.inputs.action || 'apply' }} \
            -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -var="image_tag=${{ needs.build.outputs.image_tag }}"

  # ── Job 5: Smoke test ────────────────────────────────────────────────────────
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.inputs.action != 'destroy' }}
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get backend URL
        id: url
        working-directory: infra/
        run: |
          terraform init -reconfigure
          echo "url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          curl -sf "${{ steps.url.outputs.url }}/health" | jq .

      - name: API smoke test
        run: |
          response=$(curl -sf -X POST "${{ steps.url.outputs.url }}/v1/research/start" \
            -H "Content-Type: application/json" \
            -d '{"query": "What is the current state of AI chip competition?"}')
          echo "$response" | jq .
          echo "$response" | jq -e '.session_id' > /dev/null
